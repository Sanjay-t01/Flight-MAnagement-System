<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Search Flights · FlightMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link href="/css/styles.css" rel="stylesheet" />
  </head>
  <body>
    <div id="nav"></div>

    <main class="container my-4">
      <div class="card card-soft">
        <div class="card-body p-4">
          <div class="d-flex align-items-center justify-content-between flex-wrap gap-2 mb-3">
            <div>
              <h3 class="mb-1"><i class="bi bi-search text-primary me-1"></i> Search Flights</h3>
              <div class="text-secondary">Find flights by route and date.</div>
            </div>
            <a class="btn btn-outline-primary" href="/index.html">Back to Home</a>
          </div>

          <div id="alertHost"></div>

          <form id="searchForm" class="row g-2 align-items-end">
            <div class="col-md-4">
              <label class="form-label">Departure City</label>
              <input class="form-control" name="from" placeholder="e.g., Delhi" required />
            </div>
            <div class="col-md-4">
              <label class="form-label">Destination City</label>
              <input class="form-control" name="to" placeholder="e.g., Mumbai" required />
            </div>
            <div class="col-md-3">
              <label class="form-label">Date</label>
              <input class="form-control" type="date" name="date" required />
            </div>
            <div class="col-md-1 d-grid">
              <button class="btn btn-primary" type="submit"><i class="bi bi-search"></i></button>
            </div>
          </form>

          <hr class="my-4" />

          <div class="table-responsive">
            <table class="table table-hover align-middle">
              <thead>
                <tr>
                  <th>Flight Number</th>
                  <th>Airline</th>
                  <th>Departure</th>
                  <th>Arrival</th>
                  <th class="text-end">Price</th>
                  <th class="text-end">Available Seats</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="resultsBody">
                <tr>
                  <td colspan="7" class="text-secondary">Search to see results.</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="/partials/nav.js"></script>
    <script type="module" src="/js/search.js"></script>
  </body>
</html>
