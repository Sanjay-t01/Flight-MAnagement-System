<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Booking History · FlightMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link href="/css/styles.css" rel="stylesheet" />
  </head>
  <body>
    <div id="nav"></div>

    <main class="container my-4">
      <div class="card card-soft">
        <div class="card-body p-4">
          <div class="d-flex align-items-center justify-content-between flex-wrap gap-2">
            <div>
              <h3 class="mb-1"><i class="bi bi-clock-history text-primary me-1"></i> Booking History</h3>
              <div class="text-secondary">All your booked tickets in one place.</div>
            </div>
            <a class="btn btn-outline-primary" href="/search.html">Book another flight</a>
          </div>

          <div id="alertHost" class="mt-3"></div>

          <div class="table-responsive mt-3">
            <table class="table table-hover align-middle">
              <thead>
                <tr>
                  <th>Booking Date</th>
                  <th>Flight</th>
                  <th>Route</th>
                  <th>Departure</th>
                  <th>Arrival</th>
                  <th class="text-end">Price</th>
                </tr>
              </thead>
              <tbody id="historyBody">
                <tr>
                  <td colspan="6" class="text-secondary">Loading…</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="/partials/nav.js"></script>
    <script type="module" src="/js/history.js"></script>
  </body>
</html>
