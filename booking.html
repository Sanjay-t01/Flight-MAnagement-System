<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Confirm Booking · FlightMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link href="/css/styles.css" rel="stylesheet" />
  </head>
  <body>
    <div id="nav"></div>

    <main class="container my-4" style="max-width: 960px">
      <div class="card card-soft">
        <div class="card-body p-4">
          <div class="d-flex align-items-center justify-content-between flex-wrap gap-2">
            <div>
              <h3 class="mb-1"><i class="bi bi-ticket-perforated text-primary me-1"></i> Confirm booking</h3>
              <div class="text-secondary">Review details and confirm your ticket.</div>
            </div>
            <a class="btn btn-outline-primary" href="/search.html">Back to Search</a>
          </div>

          <div id="alertHost" class="mt-3"></div>

          <div id="flightCard" class="mt-3"></div>

          <div class="d-flex gap-2 mt-3">
            <button class="btn btn-primary btn-lg" id="confirmBtn" disabled>
              <i class="bi bi-check2-circle me-1"></i> Confirm Booking
            </button>
            <a class="btn btn-outline-secondary btn-lg" href="/history.html">
              <i class="bi bi-clock-history me-1"></i> Booking History
            </a>
          </div>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="/partials/nav.js"></script>
    <script type="module" src="/js/booking.js"></script>
  </body>
</html>
