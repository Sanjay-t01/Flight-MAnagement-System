<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin Login · FlightMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link href="/css/styles.css" rel="stylesheet" />
  </head>
  <body>
    <div id="nav"></div>

    <main class="container my-4" style="max-width: 720px">
      <div class="card card-soft">
        <div class="card-body p-4 p-lg-5">
          <div class="d-flex align-items-center gap-2 mb-3">
            <i class="bi bi-shield-lock text-primary fs-3"></i>
            <div>
              <h2 class="mb-0">Admin Login</h2>
              <div class="text-secondary">Manage flight records and view bookings.</div>
            </div>
          </div>

          <div id="alertHost"></div>

          <form id="adminLoginForm" class="row g-3" novalidate>
            <div class="col-12">
              <label class="form-label">Username</label>
              <input class="form-control" name="username" placeholder="admin" required />
            </div>
            <div class="col-12">
              <label class="form-label">Password</label>
              <input class="form-control" type="password" name="password" required />
            </div>
            <div class="col-12 d-grid">
              <button class="btn btn-primary btn-lg" type="submit">
                <i class="bi bi-box-arrow-in-right me-1"></i> Login
              </button>
            </div>
          </form>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="/partials/nav.js"></script>
    <script type="module" src="/js/admin.js"></script>
  </body>
</html>
