<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>User Dashboard · FlightMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link href="/css/styles.css" rel="stylesheet" />
  </head>
  <body>
    <div id="nav"></div>

    <main class="container my-4">
      <div class="row g-3">
        <div class="col-lg-4">
          <div class="card card-soft h-100">
            <div class="card-body">
              <div class="d-flex align-items-center gap-2 mb-2">
                <i class="bi bi-person-badge text-primary fs-3"></i>
                <div>
                  <h4 class="mb-0">Welcome</h4>
                  <div class="text-secondary" id="userSubtitle">Loading…</div>
                </div>
              </div>
              <hr />
              <div class="d-grid gap-2">
                <a class="btn btn-primary" href="/search.html"><i class="bi bi-search me-1"></i> Search Flights</a>
                <a class="btn btn-outline-primary" href="/history.html"><i class="bi bi-ticket-perforated me-1"></i> Booking History</a>
              </div>
            </div>
          </div>
        </div>
        <div class="col-lg-8">
          <div class="card card-soft">
            <div class="card-body">
              <div class="d-flex align-items-center justify-content-between flex-wrap gap-2">
                <div>
                  <h4 class="mb-1">Recent bookings</h4>
                  <div class="text-secondary">Your latest tickets appear here.</div>
                </div>
                <a class="btn btn-sm btn-outline-primary" href="/history.html">View all</a>
              </div>
              <div class="table-responsive mt-3">
                <table class="table align-middle">
                  <thead>
                    <tr>
                      <th>Booking</th>
                      <th>Flight</th>
                      <th>Route</th>
                      <th class="text-end">Price</th>
                    </tr>
                  </thead>
                  <tbody id="recentBookings">
                    <tr>
                      <td colspan="4" class="text-secondary">Loading…</td>
                    </tr>
                  </tbody>
                </table>
              </div>
              <div class="text-secondary small">Book a flight to see it here.</div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="/partials/nav.js"></script>
    <script type="module" src="/js/dashboard.js"></script>
  </body>
</html>
